<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAssembly Triangle</title>
</head>

<body>
    <h1>WebAssembly Triangle Example</h1>
    <canvas id="canvas" width="640" height="480"></canvas>

    <!-- Load your generated JavaScript -->
    <script src="triangle.js"></script>

    <script>
        // Wait for the WASM module to load
        Module.onRuntimeInitialized = function () {
            // Access WebGL and render the triangle here
            var canvas = document.getElementById('canvas');
            var gl = canvas.getContext('webgl2');

            if (!gl) {
                alert("WebGL2 is not supported on this browser.");
                return;
            }

            // Your WebGL initialization and drawing code will go here
            // For example, call the WebAssembly functions to set up and draw the triangle
        }
    </script>
</body>

</html>
