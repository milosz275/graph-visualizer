<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Graph Visualizer">
    <meta name="author" content="Miłosz Maculewicz">
    <meta name="keywords" content="graph, visualizer, webgl, webassembly, wasm">
    <link rel="icon" href="favicon.ico">
    <title>Graph Visualizer</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <!-- Load your generated JavaScript -->
    <script src="graph.js"></script>

    <script>
        // Let canvas size be obtained
        function getCanvasSize() {
            var canvas = document.getElementById('canvas');
            return {
                width: canvas.width,
                height: canvas.height
            };
        }

        // Wait for the WASM module to load
        Module.onRuntimeInitialized = function () {
            var canvas = document.getElementById('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            var gl = canvas.getContext('webgl2');

            if (!gl) {
                alert("WebGL2 is not supported on this browser.");
                return;
            }

            // Your WebGL initialization and drawing code will go here
            // For example, call the WebAssembly functions to set up and draw the graph
        }
    </script>
</body>

</html>
